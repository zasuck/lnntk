name: Build and Push Dist

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create dist folder and copy files
        run: |
          mkdir -p .dist/plugins/tokinovel
          cp plugins/tokinovel/index.js .dist/plugins/tokinovel/index.js
          cp plugins.min.json .dist/plugins.min.json

      - name: Commit and push .dist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .dist
          git commit -m "Auto-build dist folder" || echo "No changes to commit"
          git push
