name: Copy Static Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create dist folder and copy files
        run: |
          mkdir -p .dist/plugins/tokinovel
          cp plugins/tokinovel/index.js .dist/plugins/tokinovel/index.js
          cp plugins.min.json .dist/plugins.min.json
